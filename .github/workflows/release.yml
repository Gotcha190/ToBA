name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Publish Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh repo clone Gotcha190/homebrew-toba /tmp/homebrew-toba
          bash ./scripts/publish-homebrew-formula.sh "${GITHUB_REF_NAME}" /tmp/homebrew-toba dist
